name: Content sync check

on:
  pull_request:
    paths:
      - "content/claude-md-example.md"
      - "guide.md"
      - "build.html"
      - "scripts/sync-content.js"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm run verify-content-sync
