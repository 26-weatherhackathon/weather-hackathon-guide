name: guide.md sync check

on:
  pull_request:
    paths:
      - "content/claude-md-example.md"
      - "guide.md"
      - "scripts/generate-guide.js"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/generate-guide.js
      - run: git diff --exit-code -- guide.md
